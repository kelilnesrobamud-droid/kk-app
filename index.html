    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fff; text-align: center; }

        /* 1. Splash Screen (መጀመሪያ የሚታየው) */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        #splash-screen img {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2ecc71;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. ዋናው ገጽ Header */
        .header { background-color: #e0f2f1; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #2ecc71; }
        .header-title { font-weight: bold; color: #2ecc71; font-size: 20px; }
        .phone { color: blue; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="icon.png" alt="Logo">
        <h2 style="color: #333;">KELIL APP</h2>
