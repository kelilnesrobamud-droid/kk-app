<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሀዲስ ቤተ-መጽሐፍት</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; direction: rtl; }
        header { background: #128c7e; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-container { padding: 10px; background: #128c7e; }
        #searchInput { width: 90%; padding: 12px; border-radius: 20px; border: none; font-size: 16px; outline: none; display: block; margin: 0 auto; }
        .container { padding: 15px; }
        .hadith-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .hadith-card h3 { color: #075e54; margin-top: 0; border-bottom: 2px solid #e9edef; padding-bottom: 10px; }
        .hadith-content { font-size: 18px; line-height: 1.6; color: #333; margin-bottom: 15px; }
        audio { width: 100%; height: 45px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2>የሀዲስ ስብስብ</h2>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="ሀዲስ ይፈልጉ..." onkeyup="searchHadith()">
    </div>
</header>

<div class="container" id="hadithContainer">
    <div class="hadith-card">
        <h3>ሀዲስ 1</h3>
        <div class="hadith-content">የሀዲሱ ጽሁፍ እዚህ ጋር ይገባል...</div>
        <audio controls>
            <source src="https://t.me/AbraribnAwal/8334?embed=1" type="audio/mpeg">
            ስልክዎ ይህን ማጫወቻ አይደግፍም።
        </audio>
    </div>

    <div class="hadith-card">
        <h3>ሀዲስ 2</h3>
        <div class="hadith-content">የሀዲሱ ጽሁፍ እዚህ ጋር ይገባል...</div>
        <audio controls>
            <source src="https://t.me/AbraribnAwal/8333?embed=1" type="audio/mpeg">
            ስልክዎ ይህን ማጫወቻ አይደግፍም።
        </audio>
    </div>

    <div class="hadith-card">
        <h3>ሀዲስ 3</h3>
        <div class="hadith-content">የሀዲሱ ጽሁፍ እዚህ ጋር ይገባል...</div>
        <audio controls>
            <source src="https://t.me/AbraribnAwal/8332?embed=1" type="audio/mpeg">
            ስልክዎ ይህን ማጫወቻ አይደግፍም።
        </audio>
    </div>
</div>

<script>
    function searchHadith() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('hadith-card');
        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
            if (title.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
