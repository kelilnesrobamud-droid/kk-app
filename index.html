<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBN ABBAS SNAKE - AMHARIC & ARABIC</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; background: #050505; color: #00ffcc; 
            font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        .header { margin-top: 10px; text-align: center; }
        .score-box { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #00ffcc; }
        
        #game-board { 
            position: relative; border: 4px solid #00ffcc; 
            background: #000; margin-top: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
        canvas { display: block; }

        /* መቆጣጠሪያ ፓድ */
        .pad-container {
            margin-top: auto; margin-bottom: 40px;
            width: 180px; height: 180px;
            background: rgba(0, 255, 204, 0.1);
            border: 3px solid #00ffcc; border-radius: 25px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .touch-btn {
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; color: #00ffcc; 
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active { background: rgba(0, 255, 204, 0.4); border-radius: 15px; }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #menu button {
            padding: 12px 45px; font-size: 20px; background: #00ffcc;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-box">ውጤት: <span id="score">0</span></div>
        <div style="margin-top:5px;">
            <select id="difficulty" style="background:#00ffcc; border:none; padding:5px 10px; border-radius:10px; font-weight:bold;">
                <option value="180">ቀላል</option>
                <option value="110" selected>መካከለኛ</option>
                <option value="70">ፈጣን</option>
            </select>
        </div>
    </div>

    <div id="game-board">
        <canvas id="snakeCanvas"></canvas>
        <div id="menu">
            <h1 style="color:#00ffcc; text-shadow: 0 0 10px #00ffcc; text-align:center;">ኢብን አባስ<br><span style="font-size:24px;">ابن عباس</span></h1>
            <button onclick="startGame()">ጀምር</button>
        </div>
    </div>

    <div class="pad-container">
        <div class="touch-btn up" id="ctrl-up">▲</div>
        <div class="touch-btn left" id="ctrl-left">◀</div>
        <div class="touch-btn right" id="ctrl-right">▶</div>
        <div class="touch-btn down" id="ctrl-down">▼</div>
    </div>

<script>
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const menu = document.getElementById("menu");
    const diffSelect = document.getElementById("difficulty");

    const grid = 20;
    let size = Math.min(window.innerWidth * 0.88, 300);
    size = Math.floor(size / grid) * grid;
    canvas.width = canvas.height = size;

    let snake, food, dx, dy, score, interval;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playFutSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function startGame() {
        menu.style.display = "none";
        score = 0; scoreText.innerText = score;
        dx = grid; dy = 0;
        let startPos = Math.floor((size / grid) / 2) * grid;
        snake = [{x: startPos, y: startPos}, {x: startPos - grid, y: startPos}];
        createFood();
        if(interval) clearInterval(interval);
        interval = setInterval(main, parseInt(diffSelect.value));
    }

    function createFood() {
        food = {
            x: Math.floor(Math.random() * (size / grid)) * grid,
            y: Math.floor(Math.random() * (size / grid)) * grid
        };
        if(snake.some(p => p.x === food.x && p.y === food.y)) createFood();
    }

    function main() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size || 
            snake.some(p => p.x === head.x && p.y === head.y)) {
            clearInterval(interval);
            menu.style.display = "flex";
            document.querySelector("#menu h1").innerHTML = "ኢብን አባስ<br>ውጤት: " + score;
            return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10; scoreText.innerText = score;
            playFutSound(); createFood();
        } else { snake.pop(); }
        draw();
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, size, size);

        // ፅሁፎች በጀርባ ላይ
        ctx.fillStyle = "rgba(0, 255, 204, 0.12)";
        ctx.textAlign = "center";
        
        ctx.font = "bold 45px Arial";
        ctx.fillText("ኢብን አባስ", size/2, size/2 - 10);
        
        ctx.font = "bold 40px 'Times New Roman'";
        ctx.fillText("ابن عباس", size/2, size/2 + 40);

        // ምግብ
        ctx.fillStyle = "#ff0055";
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055";
        ctx.fillRect(food.x + 2, food.y + 2, grid - 4, grid - 4);

        // እባብ
        ctx.shadowBlur = 0;
        snake.forEach((p, i) => {
            ctx.fillStyle = (i === 0) ? "#00ffcc" : "#008866";
            ctx.fillRect(p.x + 1, p.y + 1, grid - 2, grid - 2);
        });
    }

    function setDir(d) {
        if (d === 'U' && dy === 0) { dx = 0; dy = -grid; }
        if (d === 'D' && dy === 0) { dx = 0; dy = grid; }
        if (d === 'L' && dx === 0) { dx = -grid; dy = 0; }
        if (d === 'R' && dx === 0) { dx = grid; dy = 0; }
    }

    const map = {'ctrl-up':'U', 'ctrl-down':'D', 'ctrl-left':'L', 'ctrl-right':'R'};
    Object.keys(map).forEach(id => {
        const el = document.getElementById(id);
        const action = (e) => { e.preventDefault(); setDir(map[id]); };
        el.addEventListener('touchstart', action, {passive: false});
        el.addEventListener('mousedown', action);
    });
</script>
</body>
</html>
