<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussen App Style</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #fff; }
        .header { background-color: #e0f2f1; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; }
        .header-text { font-size: 14px; font-weight: bold; color: #d32f2f; }
        .list-item { padding: 18px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 18px; }
        
        /* Player View */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; padding-top: 50px; }
        .control-btn { border: none; background: none; cursor: pointer; margin: 10px; }
        .control-btn img { width: 80px; height: 80px; }
        .progress-container { width: 85%; margin-top: 30px; text-align: center; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; cursor: pointer; }
        .exit-btn { margin-top: 40px; background: #d32f2f; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-text">HUSSEEN APP<br>developer</div>
        <div style="text-align: center; font-size: 12px;">የምትፈልጉትን አግኙ በታማኝነት እናዘጋጃለን<br><span style="color: blue;">0935830115</span></div>
        <img src="https://cdn-icons-png.flaticon.com/512/1358/1358023.png" width="35">
    </div>

    <div id="main-list">
        <div class="list-item" onclick="openPlayer('ኡምደቱል አህካም ክፍል 01', '1PCtZw3f08YJKcj7tv2XE2WYHFkv_lCHD')">ኡምደቱል አህካም ክፍል 01 <span>></span></div>
        <div class="list-item" onclick="openPlayer('ኡምደቱል አህካም ክፍል 02', '1UtbpNwnSsCzqWH3GzRFXQWtCQ5_bB3MD')">ኡምደቱል አህካም ክፍል 02 <span>></span></div>
        <div class="list-item" onclick="openPlayer('ኡምደቱል አህካም ክፍል 03', '1XqQ3IiZZmLK8BxN2ywD9tyPDSImYE3gh')">ኡምደቱል አህካም ክፍል 03 <span>></span></div>
    </div>

    <div id="player-overlay">
        <h2 id="playing-title">ክፍል 01</h2>
        <div style="display: flex;">
            <button class="control-btn" onclick="playAudio()"><img src="https://cdn-icons-png.flaticon.com/512/0/375.png"></button>
            <button class="control-btn" onclick="pauseAudio()"><img src="https://cdn-icons-png.flaticon.com/512/1214/1214671.png"></button>
        </div>
        <div class="progress-container">
            <input type="range" id="seek-bar" value="0">
            <div style="display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; color: #d32f2f;">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>
        <button class="exit-btn" onclick="closePlayer()">Exit (መውጫ)</button>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const overlay = document.getElementById('player-overlay');
        const title = document.getElementById('playing-title');
        const seekBar = document.getElementById('seek-bar');

        function openPlayer(name, id) {
            title.innerText = name;
            // የጎግል ድራይቭ ቀጥታ ሊንክ
            audio.src = `https://docs.google.com/uc?export=download&id=${id}`;
            overlay.style.display = 'flex';
            audio.play();
        }

        function closePlayer() {
            audio.pause();
            overlay.style.display = 'none';
        }

        function playAudio() { audio.play(); }
        function pauseAudio() { audio.pause(); }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                seekBar.value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-duration').innerText = formatTime(audio.duration);
            }
        };

        seekBar.oninput = () => { audio.currentTime = (seekBar.value / 100) * audio.duration; };

        function formatTime(secs) {
            let m = Math.floor(secs / 60);
            let s = Math.floor(secs % 60);
            return m + ":" + (s < 10 ? '0' : '') + s;
        }
    </script>
</body>
</html>
