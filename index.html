<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሀዲስ መማሪያ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .hadith-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; border-left: 5px solid #2ecc71; }
        .hadith-text { font-size: 18px; color: #333; margin-bottom: 15px; font-weight: bold; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #27ae60; transform: scale(1.05); }
        .playing { background-color: #e74c3c !important; }
    </style>
</head>
<body>

    <h2 style="color: #2c3e50;">የሀዲስ መማሪያ</h2>

    <div class="container">
        <div class="hadith-card">
            <div class="hadith-text">ሀዲስ 1</div>
            <audio id="audio1">
                <source src="https://docs.google.com/uc?export=download&id=1PCtZw3f08YJKcj7tv2XE2WYHFkv_lCHD" type="audio/mpeg">
            </audio>
            <button id="btn1" onclick="playAudio('audio1', 'btn1')">አጫውት</button>
        </div>

        <div class="hadith-card">
            <div class="hadith-text">ሀዲስ 2</div>
            <audio id="audio2">
                <source src="https://docs.google.com/uc?export=download&id=1UtbpNwnSsCzqWH3GzRFXQWtCQ5_bB3MD" type="audio/mpeg">
            </audio>
            <button id="btn2" onclick="playAudio('audio2', 'btn2')">አጫውት</button>
        </div>

        <div class="hadith-card">
            <div class="hadith-text">ሀዲስ 3</div>
            <audio id="audio3">
                <source src="https://docs.google.com/uc?export=download&id=1XqQ3IiZZmLK8BxN2ywD9tyPDSImYE3gh" type="audio/mpeg">
            </audio>
            <button id="btn3" onclick="playAudio('audio3', 'btn3')">አጫውት</button>
        </div>
    </div>

    <script>
        function playAudio(audioId, btnId) {
            var audio = document.getElementById(audioId);
            var btn = document.getElementById(btnId);
            
            // ሁሉንም ድምጾች መጀመሪያ አቁም
            document.querySelectorAll('audio').forEach(el => {
                if(el.id !== audioId) { el.pause(); el.currentTime = 0; }
            });
            document.querySelectorAll('button').forEach(el => el.classList.remove('playing'));

            if (audio.paused) {
                audio.play();
                btn.innerText = "አቁም";
                btn.classList.add('playing');
            } else {
                audio.pause();
                btn.innerText = "አጫውት";
                btn.classList.remove('playing');
            }
        }
    </script>
</body>
</html>
