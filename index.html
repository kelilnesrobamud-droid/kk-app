<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussen App Style</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #fff; text-align: center; }
        .header { background-color: #e0f2f1; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; }
        .header-text { font-size: 14px; font-weight: bold; color: #d32f2f; text-align: left; }
        .list-item { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 18px; }
        
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; padding-top: 30px; }
        .audio-btns { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .control-btn { border: none; background: none; cursor: pointer; }
        .control-btn img { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #000; }
        
        .progress-container { width: 90%; margin-top: 20px; }
        input[type="range"] { width: 100%; }
        .time-display { display: flex; justify-content: space-between; color: #d32f2f; font-weight: bold; margin-top: 5px; }
        
        .exit-btn { margin-top: 30px; background: #ff4444; color: white; border: none; padding: 15px 50px; border-radius: 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-text">HUSSEEN APP<br>developer</div>
        <div style="font-size: 12px;">0935830115</div>
        <img src="https://cdn-icons-png.flaticon.com/512/1358/1358023.png" width="30">
    </div>

    <div id="main-list">
        <div class="list-item" onclick="openPlayer('ኡምደቱል አህካም ክፍል 01', 'hadith.mp3')">ኡምደቱል አህካም ክፍል 01 <span>></span></div>
    </div>

    <div id="player-overlay">
        <h3 id="playing-title">ክፍል 01</h3>
        
        <div class="audio-btns">
            <button class="control-btn" onclick="playAudio()"><img src="https://cdn-icons-png.flaticon.com/512/0/375.png"></button>
            <button class="control-btn" onclick="pauseAudio()"><img src="https://cdn-icons-png.flaticon.com/512/1214/1214671.png"></button>
        </div>

        <div class="progress-container">
            <input type="range" id="seek-bar" value="0">
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <button class="exit-btn" onclick="closePlayer()">Exit (መውጫ)</button>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const overlay = document.getElementById('player-overlay');
        const title = document.getElementById('playing-title');
        const seekBar = document.getElementById('seek-bar');

        function openPlayer(name, file) {
            title.innerText = name;
            audio.src = file;
            overlay.style.display = 'flex';
            audio.play().catch(e => console.log("Play failed: ", e));
        }

        function closePlayer() { audio.pause(); overlay.style.display = 'none'; }
        function playAudio() { audio.play(); }
        function pauseAudio() { audio.pause(); }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                seekBar.value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-duration').innerText = formatTime(audio.duration);
            }
        };

        seekBar.oninput = () => { audio.currentTime = (seekBar.value / 100) * audio.duration; };

        function formatTime(secs) {
            let m = Math.floor(secs / 60);
            let s = Math.floor(secs % 60);
            return m + ":" + (s < 10 ? '0' : '') + s;
        }
    </script>
</body>
</html>
