<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ሀዲስ App</title>
</head>
<body>

    <div class="app-container">
        <div class="header-controls">
            <button id="playBtn" class="control-btn play">▶</button>
            <button id="pauseBtn" class="control-btn pause">⏸</button>
            <button class="control-btn exit">Exit</button>
        </div>

        <div class="progress-section">
            <input type="range" id="progressBar" value="0">
            <div class="time-info">
                <span id="durationTime">00:00</span>
                <span id="currentTime">0:00</span>
            </div>
        </div>

        <div class="content-area">
            <h2 class="title">አምደቱል አህካም ክፍል 02</h2>
            <div class="arabic-text">
                عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ: أَنَّ رَسُولَ اللَّهِ ﷺ قَالَ: «إِذَا تَوَضَّأَ أَحَدُكُمْ فَلْيَجْعَلْ فِي أَنْفِهِ مَاءً ثُمَّ لَيَنْتَثِرْ...»
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
