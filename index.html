<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBN ABBAS SNAKE PRO</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; background: #050505; color: #00ffcc; 
            font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        .header { margin-top: 10px; text-align: center; }
        .score-box { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #00ffcc; }
        .high-score { font-size: 14px; color: #ffcc00; }
        
        #game-board { 
            position: relative; border: 4px solid #00ffcc; 
            background: #000; margin-top: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
        canvas { display: block; }

        .pad-container {
            margin-top: auto; margin-bottom: 30px;
            width: 200px; height: 200px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
        }
        .touch-btn {
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #00ffcc; background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc; border-radius: 15px;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active { background: rgba(0, 255, 204, 0.4); }
        .pause-btn { background: rgba(255, 204, 0, 0.1); border-color: #ffcc00; color: #ffcc00; }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .pause { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #menu button {
            padding: 12px 45px; font-size: 20px; background: #00ffcc;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        #trophy-pop {
            position: absolute; top: 30%; font-size: 80px; display: none;
            animation: bounce 1s ease infinite; z-index: 110;
        }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-box">ውጤት: <span id="score">0</span></div>
        <div class="high-score">ከፍተኛ ውጤት: <span id="highScore">0</span></div>
        <div style="margin-top:5px;">
            <select id="difficulty" style="background:#00ffcc; border:none; padding:5px 10px; border-radius:10px; font-weight:bold;">
                <option value="180">ቀላል</option>
                <option value="110" selected>መካከለኛ</option>
                <option value="70">ፈጣን</option>
            </select>
        </div>
    </div>

    <div id="game-board">
        <canvas id="snakeCanvas"></canvas>
        <div id="trophy-pop">🏆</div>
        <div id="menu">
            <h1 id="menu-title" style="color:#00ffcc; text-shadow: 0 0 10px #00ffcc; text-align:center;">ኢብን አባስ<br><span style="font-size:24px;">ابن عباس</span></h1>
            <button onclick="startGame()">ጀምር</button>
        </div>
    </div>

    <div class="pad-container">
        <div class="touch-btn up" id="ctrl-up">▲</div>
        <div class="touch-btn left" id="ctrl-left">◀</div>
        <div class="touch-btn pause" id="ctrl-pause">⏸</div>
        <div class="touch-btn right" id="ctrl-right">▶</div>
        <div class="touch-btn down" id="ctrl-down">▼</div>
    </div>

<script>
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const highScoreText = document.getElementById("highScore");
    const menu = document.getElementById("menu");
    const diffSelect = document.getElementById("difficulty");
    const trophy = document.getElementById("trophy-pop");

    const grid = 20;
    let size = Math.min(window.innerWidth * 0.88, 300);
    size = Math.floor(size / grid) * grid;
    canvas.width = canvas.height = size;

    let snake, food, bonusFood, dx, dy, score, interval, isPaused = false;
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    highScoreText.innerText = highScore;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if(type === 'eat') {
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        } else if(type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function startGame() {
        menu.style.display = "none";
        trophy.style.display = "none";
        score = 0; scoreText.innerText = score;
        dx = grid; dy = 0; isPaused = false;
        let startPos = Math.floor((size / grid) / 2) * grid;
        snake = [{x: startPos, y: startPos}, {x: startPos - grid, y: startPos}];
        bonusFood = null;
        createFood();
        if(interval) clearInterval(interval);
        interval = setInterval(main, parseInt(diffSelect.value));
    }

    function createFood() {
        food = {
            x: Math.floor(Math.random() * (size / grid)) * grid,
            y: Math.floor(Math.random() * (size / grid)) * grid
        };
        // አልፎ አልፎ ልዩ ምግብ እንዲወጣ (15% እድል)
        if (Math.random() < 0.15 && !bonusFood) {
            createBonus();
        }
    }

    function createBonus() {
        bonusFood = {
            x: Math.floor(Math.random() * (size / grid)) * grid,
            y: Math.floor(Math.random() * (size / grid)) * grid,
            timer: 50 // ለጥቂት ሰከንዶች ብቻ የሚቆይ
        };
    }

    function togglePause() {
        if (menu.style.display === "flex") return;
        isPaused = !isPaused;
        document.getElementById("ctrl-pause").innerText = isPaused ? "▶️" : "⏸";
    }

    function main() {
        if (isPaused) return;

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        
        if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size || 
            snake.some(p => p.x === head.x && p.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10; scoreText.innerText = score;
            playSound('eat'); createFood();
        } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
            score += 50; scoreText.innerText = score;
            playSound('win'); bonusFood = null;
        } else {
            snake.pop();
        }

        if (bonusFood) {
            bonusFood.timer--;
            if (bonusFood.timer <= 0) bonusFood = null;
        }

        draw();
    }

    function gameOver() {
        clearInterval(interval);
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
            highScoreText.innerText = highScore;
            trophy.style.display = "block";
            playSound('win');
        }
        menu.style.display = "flex";
        document.getElementById("menu-title").innerHTML = "ጌም አለቀ!<br>ውጤት: " + score;
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, size, size);

        // Background Text
        ctx.fillStyle = "rgba(0, 255, 204, 0.05)";
        ctx.textAlign = "center";
        ctx.font = "bold 40px Arial";
        ctx.fillText("IBN ABBAS", size/2, size/2);

        // Regular Food
        ctx.fillStyle = "#ff0055";
        ctx.shadowBlur = 10; ctx.shadowColor = "#ff0055";
        ctx.fillRect(food.x + 2, food.y + 2, grid - 4, grid - 4);

        // Bonus Food (Golden)
        if (bonusFood) {
            ctx.fillStyle = "#ffcc00";
            ctx.shadowBlur = 20; ctx.shadowColor = "#ffcc00";
            ctx.beginPath();
            ctx.arc(bonusFood.x + grid/2, bonusFood.y + grid/2, grid/2 - 2, 0, Math.PI*2);
            ctx.fill();
        }

        // Snake
        ctx.shadowBlur = 0;
        snake.forEach((p, i) => {
            ctx.fillStyle = (i === 0) ? "#00ffcc" : "#008866";
            ctx.fillRect(p.x + 1, p.y + 1, grid - 2, grid - 2);
        });
    }

    function setDir(d) {
        if (isPaused) isPaused = false; 
        document.getElementById("ctrl-pause").innerText = "⏸";
        if (d === 'U' && dy === 0) { dx = 0; dy = -grid; }
        if (d === 'D' && dy === 0) { dx = 0; dy = grid; }
        if (d === 'L' && dx === 0) { dx = -grid; dy = 0; }
        if (d === 'R' && dx === 0) { dx = grid; dy = 0; }
    }

    // Controls
    const controlMap = {'ctrl-up':'U', 'ctrl-down':'D', 'ctrl-left':'L', 'ctrl-right':'R'};
    Object.keys(controlMap).forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); setDir(controlMap[id]); });
        el.addEventListener('mousedown', () => setDir(controlMap[id]));
    });

    document.getElementById('ctrl-pause').addEventListener('click', togglePause);
</script>
</body>
</html>
