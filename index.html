<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussen App Developer Style</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #fff; }
        /* Header Style */
        .header { background-color: #e0f2f1; padding: 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; }
        .header-text { font-size: 14px; font-weight: bold; color: #d32f2f; }
        .header-phone { color: #000; font-size: 16px; }

        /* List Style */
        .list-container { padding: 0; }
        .list-item { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 18px; color: #333; }
        .list-item:hover { background-color: #f5f5f5; }

        /* Player Overlay (ይህ ክፍል የሚከፈተው አንዱ ሲነካ ነው) */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; }
        .player-controls { display: flex; gap: 20px; margin-top: 50px; }
        .control-btn { border: none; background: none; cursor: pointer; }
        .control-btn img { width: 80px; height: 80px; }
        .progress-container { width: 80%; margin-top: 30px; }
        input[type="range"] { width: 100%; }
        .exit-btn { margin-top: 50px; background: #d32f2f; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-text">HUSSEN APP<br>developer</div>
        <div style="text-align: center;">የምትፈልጉትን አግኙ<br><span style="color: blue;">0935830115</span></div>
        <img src="https://cdn-icons-png.flaticon.com/512/1358/1358023.png" width="40" alt="share">
    </div>

    <div class="list-container">
        <div class="list-item" onclick="openPlayer('ሀዲስ ክፍል 01', '1PCtZw3f08YJKcj7tv2XE2WYHFkv_lCHD')">ኡምደቱል አህካም ክፍል 01 <span>></span></div>
        <div class="list-item" onclick="openPlayer('ሀዲስ ክፍል 02', '1UtbpNwnSsCzqWH3GzRFXQWtCQ5_bB3MD')">ኡምደቱል አህካም ክፍል 02 <span>></span></div>
        <div class="list-item" onclick="openPlayer('ሀዲስ ክፍል 03', '1XqQ3IiZZmLK8BxN2ywD9tyPDSImYE3gh')">ኡምደቱል አህካም ክፍል 03 <span>></span></div>
    </div>

    <div id="player-overlay">
        <h2 id="playing-title" style="margin-top: 50px;">ሀዲስ ክፍል</h2>
        <div class="player-controls">
            <button class="control-btn" onclick="playAudio()"><img src="https://cdn-icons-png.flaticon.com/512/0/375.png" alt="Play"></button>
            <button class="control-btn" onclick="pauseAudio()"><img src="https://cdn-icons-png.flaticon.com/512/1214/1214671.png" alt="Pause"></button>
        </div>
        <div class="progress-container">
            <input type="range" id="seek-bar" value="0">
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>
        <button class="exit-btn" onclick="closePlayer()">Exit (መውጫ)</button>
        <audio id="main-audio"></audio>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const overlay = document.getElementById('player-overlay');
        const title = document.getElementById('playing-title');
        const seekBar = document.getElementById('seek-bar');

        function openPlayer(name, driveId) {
            title.innerText = name;
            audio.src = `https://docs.google.com/uc?export=download&id=${driveId}`;
            overlay.style.display = 'flex';
            audio.play();
        }

        function closePlayer() {
            audio.pause();
            overlay.style.display = 'none';
        }

        function playAudio() { audio.play(); }
        function pauseAudio() { audio.pause(); }

        // Time Update
        audio.ontimeupdate = () => {
            const current = audio.currentTime;
            const duration = audio.duration;
            if (duration) {
                seekBar.value = (current / duration) * 100;
                document.getElementById('current-time').innerText = formatTime(current);
                document.getElementById('total-duration').innerText = formatTime(duration);
            }
        };

        seekBar.oninput = () => {
            const seekTo = audio.duration * (seekBar.value / 100);
            audio.currentTime = seekTo;
        };

        function formatTime(secs) {
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }
    </script>
</body>
</html>
